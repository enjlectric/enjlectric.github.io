<!DOCTYPE html>
<html>
<head>
    <title>Text Chat Website</title>
    <style>
        .chat-container {
            width: 400px;
            height: 500px;
            border: 1px solid #ccc;
            overflow-y: scroll;
            padding: 10px;
        }
        .message {
            margin-bottom: 10px;
        }
        .user-message {
            background-color: #f2f2f2;
            padding: 5px;
            border-radius: 5px;
        }
        .bot-message {
            background-color: #e2e2e2;
            padding: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="message user-message">
            User: Hello, how can I help you?
        </div>
        <div class="message bot-message">
            Bot: Please enter your query.
        </div>
    </div>
    <form>
        <input type="text" id="user-query" placeholder="Enter your query">
        <button type="submit">Send</button>
    </form>
    <script>
        const form = document.querySelector('form');
        const chatContainer = document.querySelector('.chat-container');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const userQuery = document.getElementById('user-query').value;
            const botMessage = document.createElement('div');
            botMessage.classList.add('message', 'bot-message');
            botMessage.textContent = `Bot: Here is a LMGTFY URL for your query: https://lmgtfy.com/?q=${encodeURIComponent(userQuery)}`;
            chatContainer.appendChild(botMessage);
            document.getElementById('user-query').value = '';
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });
    </script>
</body>
</html>
